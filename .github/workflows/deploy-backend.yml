name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "Backend/**"
      - ".github/workflows/deploy-backend.yml"
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/961815749151/locations/global/workloadIdentityPools/github-pool/providers/github'
          service_account: 'deploy-service-account@project-ad3f785e-ea3f-4bb9-927.iam.gserviceaccount.com'
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: 'project-ad3f785e-ea3f-4bb9-927'

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy backend-service \
            --image us-central1-docker.pkg.dev/project-ad3f785e-ea3f-4bb9-927/backend-repo/backend-service:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
