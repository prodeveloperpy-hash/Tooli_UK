name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_KEY: ${{ secrets.GCP_KEY }}
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate GCP auth configuration
        run: |
          if [ -z "$GCP_KEY" ] && [ -z "$WIF_PROVIDER" ]; then
            echo "Missing auth secrets. Set GCP_KEY OR set both WIF_PROVIDER and WIF_SERVICE_ACCOUNT."
            exit 1
          fi

      - name: Authenticate to GCP (Service Account Key)
        if: ${{ env.GCP_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_KEY }}

      - name: Authenticate to GCP (Workload Identity)
        if: ${{ env.GCP_KEY == '' && env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: tooli-uk

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker --quiet

      - name: Build Docker Image
        run: |
          docker build -t gcr.io/tooli-uk/frontend-service Frontend

      - name: Push Docker Image
        run: |
          docker push gcr.io/tooli-uk/frontend-service

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy frontend-service \
            --image gcr.io/tooli-uk/frontend-service \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated
