name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "Frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_KEY: ${{ secrets.GCP_KEY }}
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      PROJECT_ID: project-ad3f785e-ea3f-4bb9-927
      REGION: us-central1
      REPOSITORY: frontend-repo
      SERVICE_NAME: frontend-service
      IMAGE_NAME: frontend-service
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate GCP auth configuration
        run: |
          if [ -z "$GCP_KEY" ] && { [ -z "$WIF_PROVIDER" ] || [ -z "$WIF_SERVICE_ACCOUNT" ]; }; then
            echo "Missing auth config. Set GCP_KEY or set both WIF_PROVIDER and WIF_SERVICE_ACCOUNT."
            exit 1
          fi

      - name: Authenticate to GCP (Workload Identity)
        if: ${{ env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Authenticate to GCP (Service Account Key fallback)
        if: ${{ env.WIF_PROVIDER == '' && env.WIF_SERVICE_ACCOUNT == '' && env.GCP_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "$REPOSITORY" \
            --location="$REGION" \
            --project="$PROJECT_ID" \
            >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$REPOSITORY" \
            --repository-format=docker \
            --location="$REGION" \
            --description="Frontend Docker images" \
            --project="$PROJECT_ID"

      - name: Login to Artifact Registry
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://$REGION-docker.pkg.dev"

      - name: Build Docker Image
        run: |
          docker build -t "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest" Frontend

      - name: Push Docker Image
        run: |
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated
