name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate Workload Identity configuration
        run: |
          if [ -z "$WIF_PROVIDER" ] || [ -z "$WIF_SERVICE_ACCOUNT" ]; then
            echo "Missing WIF config. Set both WIF_PROVIDER and WIF_SERVICE_ACCOUNT secrets."
            exit 1
          fi

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: tooli-uk

      - name: Login to GCR
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://gcr.io

      - name: Build Docker Image
        run: |
          docker build -t gcr.io/tooli-uk/frontend-service Frontend

      - name: Push Docker Image
        run: |
          docker push gcr.io/tooli-uk/frontend-service

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy frontend-service \
            --image gcr.io/tooli-uk/frontend-service \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated
