name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_KEY: ${{ secrets.GCP_KEY }}
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate GCP auth configuration
        run: |
          if [ -z "$GCP_KEY" ] && { [ -z "$WIF_PROVIDER" ] || [ -z "$WIF_SERVICE_ACCOUNT" ]; }; then
            echo "Missing auth config. Set GCP_KEY or set both WIF_PROVIDER and WIF_SERVICE_ACCOUNT."
            exit 1
          fi

      - name: Authenticate to GCP (Workload Identity)
        if: ${{ env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Authenticate to GCP (Service Account Key fallback)
        if: ${{ env.WIF_PROVIDER == '' && env.WIF_SERVICE_ACCOUNT == '' && env.GCP_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: tooli-uk

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe frontend-repo \
            --location=asia-south1 \
            --project=tooli-uk \
            >/dev/null 2>&1 || \
          gcloud artifacts repositories create frontend-repo \
            --repository-format=docker \
            --location=asia-south1 \
            --description="Frontend Docker images" \
            --project=tooli-uk

      - name: Login to Artifact Registry
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://asia-south1-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t asia-south1-docker.pkg.dev/tooli-uk/frontend-repo/frontend-service:latest Frontend

      - name: Push Docker Image
        run: |
          docker push asia-south1-docker.pkg.dev/tooli-uk/frontend-repo/frontend-service:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy frontend-service \
            --image asia-south1-docker.pkg.dev/tooli-uk/frontend-repo/frontend-service:latest \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated
